env:
  map_size: 256
  action_space_size: 32
  no_masking: false
  non_building_pixel: 1.0
  roi_is_black: true
  roi_threshold: 0.01
  tx_power_dbm: 23.0
  pathloss_threshold_db: 140.0
  coverage_threshold_db: -117.0
  coverage_target: 0.9
  spectral_efficiency_target: 3.5
  w1: 1.0
  w2: 1.0
  noise_coefficient_db: 10.0
  score_coverage_floor_offset: 0.01
  score_coverage_floor_min: 0.0
  score_coverage_floor_max: 1.0
  score_margin_scale_db: 6.0
  score_coverage_weight: 0.35
  score_coverage_bonus_weight: 0.15
  score_margin_weight: 0.15
  score_se_weight: 1.0
  score_under_floor_se_weight: 0.05
  score_se_target_clip: 4.0
  score_coverage_penalty_weight: 12.0
  score_se_penalty_weight: 0.2
  pathgain_db_min: -162.0
  pathgain_db_max: -75.0
  channel_bandwidth_hz: 20000000.0
  crop_size: 256
  stride: 128
  dataset_limit: 512
  dataset_offset: 0
  dataset_stride: 1

train:
  gamma: 0.99
  train_batch_size: 2048
  sgd_minibatch_size: 256
  lr: 0.00001
  num_epochs: 5
  clip_param: 0.1
  model:
    cnn_channels: [32, 64, 128, 128]
    cnn_feature_dim: 256
    head_hidden_dim: 256
